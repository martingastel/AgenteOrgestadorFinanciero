<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Agente Orquestador Estratégico</title>

<style>
html, body {
  height: 100%;
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #0f172a;
}

.presentation {
  height: 100%;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
}

.slide {
  height: 100vh;
  scroll-snap-align: start;
  background: white;
  padding: 80px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  justify-content: center;
  animation: fadeIn .6s ease;
}

.slide.dark {
  background: linear-gradient(135deg,#0f172a,#1e3a8a);
  color: white;
}

h1 { font-size: 48px; margin-bottom: 20px; }
h2 { font-size: 34px; margin-bottom: 20px; }
p  { font-size: 20px; line-height: 1.7; max-width: 900px; }

.tag {
  margin-top: 20px;
  display: inline-block;
  background: #2563eb;
  color: white;
  padding: 6px 16px;
  border-radius: 999px;
  width: fit-content;
}

.diagram {
  margin-top: 40px;
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
}

.node {
  background: #eff6ff;
  border: 2px solid #2563eb;
  border-radius: 16px;
  padding: 18px;
  width: 220px;
  text-align: center;
  cursor: pointer;
  transition: all .25s;
}

.node:hover {
  transform: translateY(-6px);
  box-shadow: 0 10px 25px rgba(37,99,235,.25);
}

.panel {
  margin-top: 30px;
  padding: 24px;
  border-radius: 16px;
  background: #f8fafc;
  display: none;
}

.panel.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="presentation">

  <!-- Slide 1 -->
  <section class="slide dark">
    <h1>Agente Orquestador Estratégico</h1>
